</head>

<body>

    <!-- BARRA SUPERIOR -->

        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="inicio.html">
                <img src="imagenes/logo.png" alt="Logo" class="logo-hotel me-2">
                Hotel Luxury
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <!-- MENÚ IZQUIERDA -->
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link" href="inicio.html">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="reservar.html">Reservar</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="restaurante.html">Restaurante</a>

                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="eventos.html">Eventos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="contacto.html">Contacto</a>
                    </li>
                </ul>

                <!-- MENÚ USUARIO A LA DERECHA -->
                <ul class="navbar-nav ms-auto">
                    <!-- Nombre del usuario -->
                    <li class="nav-item d-flex align-items-center me-2">
                        <span id="nombre-usuario" class="text-white fw-bold"></span>
                    </li>
                    <!-- Icono + menú -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#"
                            data-bs-toggle="dropdown">
                            <img src="imagenes/perfil.png" class="icono-usuario">
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="perfil.html">Mi Perfil</a></li>
                            <li><a class="dropdown-item" href="#" onclick="cerrarSesion()">Cerrar sesión</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="mt-5 pt-4"></div>

    <div class="container mt-4">
        <h2 class="text-center mb-4">Habitaciones Disponibles</h2>
        <div id="msg-reserva" class="alert d-none mb-3 text-center"></div>

        <!-- Aqui empezamos a renderizar desde JS -->

        <div id="contenedor-habitaciones">
        </div>


    </div>


    <!-- MODAL DE PAGO PREMIUM -->
    <div class="modal fade" id="modalPago" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-pago-premium">

                <div class="modal-header border-0">
                    <div class="d-flex align-items-center">
                        <span class="icono-tarjeta me-2">💳</span>
                        <h5 class="modal-title">Confirmar Pago</h5>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <p class="text-gold mb-3" id="resumenPago"></p>

                    <label class="fw-bold text-light">Nombre del titular</label>
                    <input type="text" id="pagoNombre" class="form-control mb-1 campo-pago">
                    <small id="msgNombre" class="text-warning d-block mb-2"></small>

                    <label class="fw-bold text-light">Número de tarjeta</label>
                    <input type="text" id="pagoNumero" class="form-control mb-1 campo-pago" maxlength="19"
                        placeholder="1234 5678 9012 3456">
                    <small id="msgNumero" class="text-warning d-block mb-2"></small>

                    <div class="row">
                        <div class="col-6">
                            <label class="fw-bold text-light">Fecha de expiración</label>
                            <input type="month" id="pagoExpiracion" class="form-control mb-1 campo-pago">
                            <small id="msgExp" class="text-warning d-block mb-2"></small>
                        </div>
                        <div class="col-6">
                            <label class="fw-bold text-light">Código de seguridad</label>
                            <input type="password" id="pagoCVV" class="form-control mb-1 campo-pago" maxlength="3"
                                placeholder="***">
                            <small id="msgCVV" class="text-warning d-block mb-2"></small>
                        </div>
                    </div>

                </div>

                <div class="modal-footer border-0">
                    <button class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
                    <button id="btnConfirmarPago" class="btn btn-gold" disabled>Confirmar Pago</button>
                </div>

            </div>
        </div>
    </div>



    <footer class="bg-dark text-white text-center py-3">
        <p>© 2026 Hotel Luxury — Todos los derechos reservados</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="./js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="./js/global/global.js"></script>
    <script src="./js/reservas/reservas.js"></script>

</body>

</html>
