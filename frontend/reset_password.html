<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña - Hotel Luxury</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="./css/bootstrap/bootstrap.min.css">

    <!-- Estilos del proyecto -->
    <link rel="stylesheet" href="./css/estilos.css">
</head>

<body class="fondo-login">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4" style="max-width: 400px; width: 100%;">

            <h3 class="text-center mb-4">Restablecer contraseña</h3>
            <div id="msg-reset" class="alert d-none mb-3 text-center"></div>
            <form id="resetForm" novalidate>

    <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input id="reset-email" type="email" class="form-control" placeholder="ejemplo@correo.com">
        <small class="text-danger d-none" id="error-email"></small>
    </div>

    <div class="mb-3">
        <label class="form-label">Nueva contraseña</label>
        <input id="new-pass1" type="password" class="form-control" placeholder="Introduce tu nueva contraseña">
        <small class="text-danger d-none" id="error-pass1"></small>
    </div>

    <div class="mb-3">
        <label class="form-label">Repite la contraseña</label>
        <input id="new-pass2" type="password" class="form-control" placeholder="Repite la contraseña">
        <small class="text-danger d-none" id="error-pass2"></small>
    </div>

    <button id="btn-guardar" type="submit" class="btn btn-primary w-100">
        Guardar cambios
    </button>

    <a href="loggin.html" class="btn btn-outline-dark w-100 mt-3">
        Volver al inicio de sesión
    </a>

</form>


        </div>
    </div>

    <script src="./js/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="./js/reset_password/reset.js"></script>

</body>
</html>
